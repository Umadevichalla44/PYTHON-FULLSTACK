<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      .parent {
        border: 5px solid black;
        width: 200px;
        height: 100px;
        display: flex;
        gap: 5px;
      }
      .parent > div {
        flex-flow: 1;
        flex-shrink: 0;
        flex-basis: 100px;
        width: 100px;
        height: 100px;
        background-color: yellow;
      }
      .parent > .child1 {
        flex-grow: 1;
      }
      .parent > .child2 {
        flex-grow: 2;
      }
      .parent > .child3 {
        flex-grow: 3;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child1"></div>
      <div class="child2"></div>
      <div class="child3"></div>
    </div>
  </body>
</html>
