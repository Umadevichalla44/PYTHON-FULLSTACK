<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      img {
        width: 500px;
        animation: load 10s linear 0s 1 normal forward;
      }
      h1 {
        text-transform: uppercase;
        font-size: 100px;
        text-align: center;
        color: blue;
        animation: enter 10s linear 0s 1 normal;
      }
      @keyframes entry {
        from {
          transform: translateX(100px);
        }
        to {
          transform: translateX(0px);
        }
      }
    </style>
  </head>
  <body>
    <img src="image.jpg" alt="error loding image" />
    <h1>Hello I am Umadevi</h1>
  </body>
</html>
