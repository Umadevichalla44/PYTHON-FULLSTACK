<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
  </head>
  <body>
    <input type="text" id="num1" placeholder="Enter value 1" />
    <input type="text" id="num2" placeholder="Enter value 2" />
    <input type="text" id="operator" placeholder="Enter operator" />

    <button onclick="calculate()">Get Answer</button>

    <h1 id="res">Result:</h1>

    <script>
      function calculate() {
        let num1 = Number(document.getElementById("num1").value);
        let num2 = Number(document.getElementById("num2").value);
        let operator = document.getElementById("operator").value.trim();

        let result;

        if (operator === "+") {
          result = num1 + num2;
        } else if (operator === "-") {
          result = num1 - num2;
        } else if (operator === "*") {
          result = num1 * num2;
        } else if (operator === "/") {
          if (num2 === 0) {
            result = "Cannot divide by zero";
          } else {
            result = num1 / num2;
          }
        } else {
          result = "Invalid Operator";
        }

        document.getElementById("res").innerText = "Result: " + result;
      }
    </script>
  </body>
</html>
