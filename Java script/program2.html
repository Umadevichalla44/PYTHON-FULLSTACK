<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input id="xyz" type="text" placeholder="Enter your Name" /><br /><br />
    <button onclick="show()">view</button>
    <h1 id="result">Result</h1>

    <script>
      function show() {
        // getting data
        let name = document.getElementById("xyz").value;
        // processing
        let res = "My Name is " + name;
        //sending back processed data
        document.getElementById("result").innerText = res;
      }
    </script>
  </body>
</html>
