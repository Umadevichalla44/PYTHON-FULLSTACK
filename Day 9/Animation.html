<!DOCTYPE html>
<html lang="en">
<head>
    <title>Animation</title>
    <style>
        .box {
            background-color: red;
            border: 10px solid black;
            height: 300px;
            width: 300px;
            margin-top: 100px;
            margin-left: 100px;
        }
        .box:hover {
            background-color: yellow;
            border-radius: 100%;
            transition-duration: 7s;
            transform: rotateX(360deg);
        }
    </style>
</head>
<body>
    <div class="box">

    </div>
</body>
</html>
